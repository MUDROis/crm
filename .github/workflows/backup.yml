name: Daily Backup

on:
  schedule:
    # Каждый день в 03:00 UTC (примерно 06:00 по Москве)
    - cron: '0 3 * * *'
  workflow_dispatch: # позволяет запускать вручную через интерфейс GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # разрешаем пушить в репозиторий

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Run backup script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/backup.js

      - name: Commit and push backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "Автоматический бэкап от $(date +%Y-%m-%d)"
          git push